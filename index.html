<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swollmeter</title>
  <style>
    :root {
      --bg:    #000000;
      --s1:    #1C1C1E;
      --s2:    #2C2C2E;
      --s3:    #3A3A3C;
      --label: #FFFFFF;
      --l2:    rgba(235,235,245,0.6);
      --l3:    rgba(235,235,245,0.3);
      --sep:   rgba(84,84,88,0.65);
      --blue:  #007AFF;
      --green: #34C759;
      --red:   #FF3B30;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    /* ── Flash overlay ── */
    #flashOverlay { position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0; }
    #flashOverlay.active { animation: screenFlash 0.4s ease-out forwards; }
    @keyframes screenFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* ── Section headers (iOS grouped list style) ── */
    .section-label {
      font-size: 13px; font-weight: 600; color: var(--l3);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px; padding: 0 4px;
    }

    /* ── Cards ── */
    .card { background: var(--s2); border-radius: 16px; }
    .card.logged { animation: cardPop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes cardPop {
      0%   { transform: scale(1); box-shadow: none; }
      45%  { transform: scale(1.025); box-shadow: 0 6px 28px rgba(0,122,255,0.28); }
      100% { transform: scale(1); box-shadow: none; }
    }

    /* ── Inputs ── */
    input[type="number"] {
      background: var(--s3); color: var(--label);
      border: none; outline: none;
      font-family: inherit; font-size: 17px; font-weight: 500;
      -moz-appearance: textfield; width: 100%; text-align: center; height: 44px;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { box-shadow: inset 0 0 0 2px var(--blue); }

    /* ── Stepper buttons ── */
    .step-btn {
      background: var(--s3); color: var(--blue); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      user-select: none; touch-action: manipulation;
      font-size: 24px; font-weight: 300; min-width: 44px; height: 44px;
      transition: background 0.1s;
    }
    .step-btn:active { background: #4A4A4C; }

    /* ── Primary button ── */
    #mainLogBtn {
      width: 100%; padding: 16px;
      background: var(--blue); color: #fff; border: none;
      font-family: inherit; font-size: 17px; font-weight: 600;
      border-radius: 14px; cursor: pointer;
      letter-spacing: -0.2px; touch-action: manipulation;
      transition: background 0.15s, transform 0.1s;
    }
    #mainLogBtn:active { background: #0062CC; transform: scale(0.98); }
    #mainLogBtn.success { animation: btnSuccess 1.6s ease-out forwards; }
    @keyframes btnSuccess {
      0%   { background: var(--green); }
      70%  { background: var(--green); }
      100% { background: var(--blue); }
    }

    /* ── Heatmap ── */
    .hm-day { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
    .hm-label { font-size: 11px; font-weight: 500; color: var(--l3); }
    .hm-dot {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--s2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: transparent;
      transition: all 0.3s;
    }
    .hm-day.active   .hm-label { color: var(--blue); }
    .hm-day.active   .hm-dot   { background: var(--blue); color: #fff; }
    .hm-day.today    .hm-label { color: var(--blue); font-weight: 700; }
    .hm-day.today:not(.active) .hm-dot { background: var(--s3); box-shadow: inset 0 0 0 2px var(--blue); }

    /* ── Exercise icon tile ── */
    .ex-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    /* ── Inline action buttons ── */
    .btn-edit {
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--blue); background: rgba(0,122,255,0.12); border: none;
      padding: 5px 14px; border-radius: 8px; cursor: pointer;
      transition: background 0.12s; touch-action: manipulation;
    }
    .btn-edit:active { background: rgba(0,122,255,0.22); }

    .btn-del {
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--red); background: rgba(255,59,48,0.1); border: none;
      padding: 5px 14px; border-radius: 8px; cursor: pointer;
      transition: all 0.12s; touch-action: manipulation;
    }
    .btn-del:active { background: rgba(255,59,48,0.2); }
    .btn-del.confirm { background: var(--red); color: #fff; }

    /* ── History card ── */
    .history-card { background: var(--s2); border-radius: 14px; padding: 14px; }

    /* ── BOTTOM NAV ── */
    #bottomNav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(20,20,22,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 0.5px solid var(--sep);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 500;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; padding: 10px 0;
      color: var(--l3); background: transparent; border: none;
      font-family: inherit; font-size: 10px; font-weight: 500;
      cursor: pointer; transition: color 0.18s; touch-action: manipulation;
    }
    .nav-tab svg { width: 25px; height: 25px; }
    .nav-tab.active { color: var(--blue); }

    /* ── CALENDAR ── */
    .cal-dow {
      display: grid; grid-template-columns: repeat(7,1fr);
      margin-bottom: 4px;
    }
    .cal-dow span {
      text-align: center; font-size: 12px; font-weight: 600;
      color: var(--l3); padding: 4px 0;
    }
    #calGrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell {
      aspect-ratio: 1; border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.14s;
      touch-action: manipulation; user-select: none; position: relative;
    }
    .cal-cell.empty  { cursor: default; pointer-events: none; }
    .cal-cell .cn    { font-size: 15px; font-weight: 400; color: var(--l2); }
    .cal-cell .cd    { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-top: 2px; }
    .cal-cell.has-session .cd { background: var(--blue); }
    .cal-cell.is-today:not(.is-selected) { background: rgba(0,122,255,0.14); }
    .cal-cell.is-today .cn   { color: var(--blue); font-weight: 700; }
    .cal-cell.is-selected    { background: var(--blue); }
    .cal-cell.is-selected .cn { color: #fff; font-weight: 700; }
    .cal-cell.is-selected .cd { background: rgba(255,255,255,0.55); }
    .cal-cell:not(.empty):not(.is-selected):active { background: var(--s2); }

    #dayPanel { animation: fadeUp 0.2s ease-out; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── EDIT MODAL ── */
    #editModal {
      position: fixed; inset: 0; z-index: 800;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: none; align-items: flex-end;
    }
    #editModal.open { display: flex; }
    .modal-sheet {
      width: 100%; background: var(--s1);
      border-radius: 22px 22px 0 0;
      max-height: 90vh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom);
      animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-handle { width: 36px; height: 5px; background: var(--s3); border-radius: 3px; margin: 12px auto 0; }

    .modal-primary-btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-family: inherit; font-size: 17px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; touch-action: manipulation;
    }
    .modal-primary-btn.save   { background: var(--blue); color: #fff; }
    .modal-primary-btn.save:active   { background: #0062CC; }
    .modal-primary-btn.cancel { background: var(--s2); color: var(--blue); }
    .modal-primary-btn.cancel:active { background: var(--s3); }
    .modal-primary-btn.delete { background: rgba(255,59,48,0.1); color: var(--red); }
    .modal-primary-btn.delete:active { background: rgba(255,59,48,0.2); }
    .modal-primary-btn.delete.confirm { background: var(--red); color: #fff; }

    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="flashOverlay"></div>

  <!-- ══════════════════ LOG VIEW ══════════════════ -->
  <div id="viewLog">

    <header style="padding: 58px 20px 16px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
        <div>
          <div style="font-size:34px; font-weight:700; letter-spacing:-0.5px; line-height:1.05;">Swollmeter</div>
          <div style="font-size:14px; color:var(--l3); margin-top:3px;">Gym Progress Tracker</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px; font-weight:600; color:var(--l3); text-transform:uppercase; letter-spacing:0.05em;">This week</div>
          <div id="weekCount" style="font-size:44px; font-weight:700; color:var(--blue); line-height:1; letter-spacing:-1px;">0</div>
        </div>
      </div>
      <!-- Heatmap -->
      <div id="heatmap" style="display:flex; gap:4px;"></div>
    </header>

    <div style="padding: 8px 20px 0;">
      <div class="section-label">Exercises</div>
      <div id="exerciseList" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <div style="padding: 20px 20px 0;">
      <button id="mainLogBtn" onclick="logSession()">Log Session</button>
    </div>

    <div style="padding: 28px 20px 0;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span class="section-label" style="margin:0;">Recent Sessions</span>
        <button id="historyToggle" onclick="toggleHistory()"
          style="font-size:15px; font-weight:500; color:var(--blue); background:none; border:none; cursor:pointer;">Show</button>
      </div>
      <div id="historyPanel" style="display:none; flex-direction:column; gap:8px;"></div>
    </div>
  </div>

  <!-- ══════════════════ CALENDAR VIEW ══════════════════ -->
  <div id="viewCalendar" style="display:none;">
    <header style="padding: 58px 20px 16px;">
      <div style="font-size:34px; font-weight:700; letter-spacing:-0.5px; line-height:1.05; margin-bottom:3px;">Calendar</div>
      <div style="font-size:14px; color:var(--l3);">Session History</div>
    </header>

    <div style="padding: 0 20px;">
      <!-- Month nav -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <button onclick="shiftMonth(-1)"
          style="background:var(--s2); border:none; color:var(--blue); width:36px; height:36px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation;">‹</button>
        <span id="calMonthLabel" style="font-size:17px; font-weight:600; letter-spacing:-0.2px;"></span>
        <button onclick="shiftMonth(1)"
          style="background:var(--s2); border:none; color:var(--blue); width:36px; height:36px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation;">›</button>
      </div>
      <div class="cal-dow">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div id="calGrid"></div>
      <div id="dayPanel" style="margin-top:16px;"></div>
    </div>
  </div>

  <!-- ══════════════════ BOTTOM NAV ══════════════════ -->
  <nav id="bottomNav">
    <button class="nav-tab active" id="tab-log" onclick="setView('log')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4.5" y="9" width="3" height="6" rx="1.2"/>
        <rect x="16.5" y="9" width="3" height="6" rx="1.2"/>
        <line x1="7.5" y1="12" x2="16.5" y2="12" stroke-width="2.2"/>
        <line x1="2.5" y1="10.5" x2="4.5" y2="10.5" stroke-width="2.2"/>
        <line x1="2.5" y1="13.5" x2="4.5" y2="13.5" stroke-width="2.2"/>
        <line x1="19.5" y1="10.5" x2="21.5" y2="10.5" stroke-width="2.2"/>
        <line x1="19.5" y1="13.5" x2="21.5" y2="13.5" stroke-width="2.2"/>
      </svg>
      Log
    </button>
    <button class="nav-tab" id="tab-calendar" onclick="setView('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="3.5"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <circle cx="8"  cy="15" r="1.1" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="15" r="1.1" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="15" r="1.1" fill="currentColor" stroke="none"/>
      </svg>
      Calendar
    </button>
  </nav>

  <!-- ══════════════════ EDIT MODAL ══════════════════ -->
  <div id="editModal" onclick="if(event.target===this)closeEdit()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <div style="display:flex; justify-content:space-between; align-items:flex-start; padding: 18px 20px 14px;">
        <div>
          <div style="font-size:19px; font-weight:700; letter-spacing:-0.3px;">Edit Session</div>
          <div id="editDateLabel" style="font-size:13px; color:var(--l3); margin-top:3px;"></div>
        </div>
        <button onclick="closeEdit()"
          style="width:30px; height:30px; border-radius:50%; background:var(--s2); border:none;
                 color:var(--l2); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;">✕</button>
      </div>

      <div style="height:0.5px; background:var(--sep); margin:0 20px;"></div>

      <div id="editExercises" style="padding:16px 20px; display:flex; flex-direction:column; gap:16px;"></div>

      <div style="padding:0 20px 20px; display:flex; flex-direction:column; gap:10px;">
        <button class="modal-primary-btn save" onclick="saveEdit()">Save Changes</button>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <button id="deleteBtn" class="modal-primary-btn delete" onclick="deleteSessionById()">Delete</button>
          <button class="modal-primary-btn cancel" onclick="closeEdit()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  // ── Config ────────────────────────────────────────────────────────────────
  const EXERCISES = [
    { name:'Chest Press',    emoji:'🏋️', bg:'linear-gradient(135deg,#FF6B35,#F7931E)', weightStep:5,  repsStep:1 },
    { name:'Seated Row',     emoji:'🚣', bg:'linear-gradient(135deg,#007AFF,#5AC8FA)', weightStep:5,  repsStep:1 },
    { name:'Machine Crunch', emoji:'🤸', bg:'linear-gradient(135deg,#AF52DE,#FF2D55)', weightStep:5,  repsStep:1 },
    { name:'Leg Press',      emoji:'🦵', bg:'linear-gradient(135deg,#34C759,#30D158)', weightStep:10, repsStep:1 },
    { name:'Dumbbell Work',  emoji:'💪', bg:'linear-gradient(135deg,#FF2D55,#FF9500)', weightStep:5,  repsStep:1 },
  ];
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];
  const KEY = 'swollmeter_v2';

  // ── State ─────────────────────────────────────────────────────────────────
  let sessions      = JSON.parse(localStorage.getItem(KEY) || '[]');
  let currentView   = 'log';
  let calYear       = new Date().getFullYear();
  let calMonth      = new Date().getMonth();
  let selectedDay   = null;
  let editId        = null;
  let deletePending = false;
  let historyOpen   = false;

  function save() { localStorage.setItem(KEY, JSON.stringify(sessions)); }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getLastEntry(name) {
    for (let i = sessions.length - 1; i >= 0; i--) {
      const e = sessions[i].entries[name];
      if (e && (e.weight > 0 || e.reps > 0)) return e;
    }
    return null;
  }

  function getWeekSessions() {
    const now = new Date(), sow = new Date(now);
    sow.setDate(now.getDate() - now.getDay()); sow.setHours(0,0,0,0);
    return sessions.filter(s => new Date(s.date) >= sow);
  }

  function flash(color = 'rgba(0,122,255,0.12)') {
    const ov = document.getElementById('flashOverlay');
    ov.style.background = color;
    ov.classList.remove('active'); void ov.offsetWidth; ov.classList.add('active');
  }

  // ── View ──────────────────────────────────────────────────────────────────
  function setView(v) {
    currentView = v;
    document.getElementById('viewLog').style.display      = v==='log'      ? '' : 'none';
    document.getElementById('viewCalendar').style.display = v==='calendar' ? '' : 'none';
    document.getElementById('tab-log').classList.toggle('active',      v==='log');
    document.getElementById('tab-calendar').classList.toggle('active', v==='calendar');
    if (v === 'calendar') renderCalendar();
  }

  // ── Heatmap ───────────────────────────────────────────────────────────────
  function renderHeatmap() {
    const el    = document.getElementById('heatmap');
    const today = new Date().getDay();
    const week  = getWeekSessions();
    const byDay = {};
    week.forEach(s => { const d = new Date(s.date).getDay(); byDay[d] = (byDay[d]||0)+1; });

    el.innerHTML = '';
    ['S','M','T','W','T','F','S'].forEach((label, i) => {
      const isActive = (byDay[i]||0) > 0;
      const div = document.createElement('div');
      div.className = `hm-day ${isActive?'active':''} ${i===today?'today':''}`;
      div.innerHTML = `<div class="hm-dot">${isActive ? '✓' : ''}</div><span class="hm-label">${label}</span>`;
      el.appendChild(div);
    });
    document.getElementById('weekCount').textContent = week.length;
  }

  // ── Exercise cards ────────────────────────────────────────────────────────
  function renderExercises() {
    const list = document.getElementById('exerciseList');
    list.innerHTML = '';

    EXERCISES.forEach(({ name, emoji, bg, weightStep, repsStep }, idx) => {
      const last    = getLastEntry(name);
      const hasLast = last !== null;
      const card = document.createElement('div');
      card.className = 'card'; card.id = `card-${idx}`;
      card.style.padding = '14px';
      card.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
          <div class="ex-icon" style="background:${bg};">${emoji}</div>
          <div style="flex:1; min-width:0;">
            <div style="font-size:17px; font-weight:600; letter-spacing:-0.2px;">${name}</div>
            <div style="font-size:13px; color:${hasLast ? 'var(--blue)' : 'var(--l3)'}; margin-top:2px;">
              ${hasLast ? `Last: ${last.weight} lb &times; ${last.reps} reps` : 'No data yet'}
            </div>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div>
            <div style="font-size:11px; font-weight:600; color:var(--l3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Weight (lb)</div>
            <div style="display:flex; border-radius:10px; overflow:hidden;">
              <button class="step-btn" style="border-radius:10px 0 0 10px;" onclick="step('w${idx}',-${weightStep})">−</button>
              <input type="number" id="w${idx}" min="0" step="${weightStep}" placeholder="0" value="${hasLast ? last.weight : ''}">
              <button class="step-btn" style="border-radius:0 10px 10px 0;" onclick="step('w${idx}',${weightStep})">+</button>
            </div>
          </div>
          <div>
            <div style="font-size:11px; font-weight:600; color:var(--l3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Reps</div>
            <div style="display:flex; border-radius:10px; overflow:hidden;">
              <button class="step-btn" style="border-radius:10px 0 0 10px;" onclick="step('r${idx}',-${repsStep})">−</button>
              <input type="number" id="r${idx}" min="0" step="${repsStep}" placeholder="0" value="${hasLast ? last.reps : ''}">
              <button class="step-btn" style="border-radius:0 10px 10px 0;" onclick="step('r${idx}',${repsStep})">+</button>
            </div>
          </div>
        </div>`;
      list.appendChild(card);
    });
  }

  function step(id, delta) {
    const el = document.getElementById(id);
    el.value = Math.max(0, (parseFloat(el.value)||0) + delta);
  }

  // ── Log session ───────────────────────────────────────────────────────────
  function logSession() {
    const entries = {}; let hasData = false;
    EXERCISES.forEach(({ name }, idx) => {
      const w = parseFloat(document.getElementById(`w${idx}`).value)||0;
      const r = parseInt(document.getElementById(`r${idx}`).value)||0;
      entries[name] = { weight:w, reps:r };
      if (w > 0 || r > 0) hasData = true;
    });
    if (!hasData) { flash('rgba(255,59,48,0.1)'); return; }

    sessions.push({ id:Date.now(), date:new Date().toISOString(), entries });
    save();

    flash('rgba(52,199,89,0.1)');
    EXERCISES.forEach((_, idx) => {
      const card = document.getElementById(`card-${idx}`);
      if (!card) return;
      setTimeout(() => { card.classList.remove('logged'); void card.offsetWidth; card.classList.add('logged'); }, idx * 65);
    });
    const btn = document.getElementById('mainLogBtn');
    btn.textContent = '✓  Logged!'; btn.classList.add('success');
    setTimeout(() => { btn.classList.remove('success'); btn.textContent = 'Log Session'; }, 1700);

    renderHeatmap(); renderExercises();
    if (historyOpen) renderHistory();
  }

  // ── History ───────────────────────────────────────────────────────────────
  function toggleHistory() {
    historyOpen = !historyOpen;
    document.getElementById('historyPanel').style.display = historyOpen ? 'flex' : 'none';
    document.getElementById('historyToggle').textContent  = historyOpen ? 'Hide' : 'Show';
    if (historyOpen) renderHistory();
  }

  function sessionCardHTML(s) {
    const d       = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const timeStr = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    const rows    = EXERCISES.map(({ name, emoji }) => {
      const e = s.entries[name];
      if (!e || (e.weight===0 && e.reps===0)) return '';
      return `<div style="display:flex; justify-content:space-between; align-items:center; padding:3px 0;">
        <span style="font-size:14px; color:var(--l2);">${emoji}&nbsp; ${name}</span>
        <span style="font-size:14px; font-weight:500;">${e.weight} lb &times; ${e.reps}</span>
      </div>`;
    }).filter(Boolean).join('');

    return `
      <div class="history-card">
        <div style="display:flex; justify-content:space-between; align-items:center; ${rows ? 'margin-bottom:10px;' : ''}">
          <div>
            <div style="font-size:15px; font-weight:600;">${dateStr}</div>
            <div style="font-size:13px; color:var(--l3); margin-top:2px;">${timeStr}</div>
          </div>
          <div style="display:flex; gap:8px; flex-shrink:0;">
            <button class="btn-del" id="del-${s.id}" onclick="deleteCard(${s.id},this)">Delete</button>
            <button class="btn-edit" onclick="openEdit(${s.id})">Edit</button>
          </div>
        </div>
        ${rows ? `<div style="border-top:0.5px solid var(--sep); padding-top:8px;">${rows}</div>` : ''}
      </div>`;
  }

  function renderHistory() {
    const panel  = document.getElementById('historyPanel');
    const recent = [...sessions].reverse().slice(0, 15);
    panel.innerHTML = recent.length === 0
      ? '<div style="font-size:15px; color:var(--l3); text-align:center; padding:20px 0;">No sessions yet</div>'
      : recent.map(sessionCardHTML).join('');
  }

  // ── Calendar ──────────────────────────────────────────────────────────────
  function shiftMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    selectedDay = null; renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
    const now = new Date();
    const daysInMonth  = new Date(calYear, calMonth+1, 0).getDate();
    const firstWeekday = new Date(calYear, calMonth, 1).getDay();
    const byDay = {};
    sessions.forEach(s => {
      const d = new Date(s.date);
      if (d.getFullYear()===calYear && d.getMonth()===calMonth)
        byDay[d.getDate()] = (byDay[d.getDate()]||0) + 1;
    });

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    for (let i = 0; i < firstWeekday; i++) {
      const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = now.getFullYear()===calYear && now.getMonth()===calMonth && now.getDate()===d;
      const isSel   = selectedDay && selectedDay.year===calYear && selectedDay.month===calMonth && selectedDay.day===d;
      const el = document.createElement('div');
      el.className = `cal-cell ${byDay[d]?'has-session':''} ${isToday?'is-today':''} ${isSel?'is-selected':''}`;
      el.innerHTML  = `<span class="cn">${d}</span><span class="cd"></span>`;
      el.onclick    = () => selectCalDay(calYear, calMonth, d);
      grid.appendChild(el);
    }
    renderDayPanel();
  }

  function selectCalDay(year, month, day) {
    selectedDay = (selectedDay && selectedDay.year===year && selectedDay.month===month && selectedDay.day===day)
      ? null : { year, month, day };
    renderCalendar();
  }

  function renderDayPanel() {
    const panel = document.getElementById('dayPanel');
    if (!selectedDay) { panel.innerHTML = ''; return; }
    const { year, month, day } = selectedDay;
    const daySessions = sessions.filter(s => {
      const d = new Date(s.date);
      return d.getFullYear()===year && d.getMonth()===month && d.getDate()===day;
    });
    const dateStr = new Date(year, month, day).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    panel.innerHTML = `
      <div style="height:0.5px; background:var(--sep); margin-bottom:16px;"></div>
      <div style="font-size:15px; font-weight:600; color:var(--l2); margin-bottom:12px;">${dateStr}</div>
      ${daySessions.length === 0
        ? `<div style="font-size:15px; color:var(--l3); text-align:center; padding:16px 0;">No sessions this day</div>`
        : `<div style="display:flex; flex-direction:column; gap:8px;">${daySessions.map(sessionCardHTML).join('')}</div>`
      }`;
  }

  // ── Edit modal ────────────────────────────────────────────────────────────
  function openEdit(sessionId) {
    const session = sessions.find(s => s.id === sessionId);
    if (!session) return;
    editId = sessionId; deletePending = false;

    const d = new Date(session.date);
    document.getElementById('editDateLabel').textContent =
      d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }) +
      ' · ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

    document.getElementById('editExercises').innerHTML = EXERCISES.map(({ name, emoji, bg, weightStep, repsStep }, idx) => {
      const e = session.entries[name] || { weight:0, reps:0 };
      return `
        <div>
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <div class="ex-icon" style="background:${bg}; width:32px; height:32px; border-radius:8px; font-size:16px;">${emoji}</div>
            <span style="font-size:15px; font-weight:600;">${name}</span>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>
              <div style="font-size:11px; font-weight:600; color:var(--l3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Weight (lb)</div>
              <div style="display:flex; border-radius:10px; overflow:hidden;">
                <button class="step-btn" style="border-radius:10px 0 0 10px;" onclick="step('ew${idx}',-${weightStep})">−</button>
                <input type="number" id="ew${idx}" min="0" step="${weightStep}" value="${e.weight||''}" placeholder="0">
                <button class="step-btn" style="border-radius:0 10px 10px 0;" onclick="step('ew${idx}',${weightStep})">+</button>
              </div>
            </div>
            <div>
              <div style="font-size:11px; font-weight:600; color:var(--l3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Reps</div>
              <div style="display:flex; border-radius:10px; overflow:hidden;">
                <button class="step-btn" style="border-radius:10px 0 0 10px;" onclick="step('er${idx}',-${repsStep})">−</button>
                <input type="number" id="er${idx}" min="0" step="${repsStep}" value="${e.reps||''}" placeholder="0">
                <button class="step-btn" style="border-radius:0 10px 10px 0;" onclick="step('er${idx}',${repsStep})">+</button>
              </div>
            </div>
          </div>
        </div>
        ${idx < EXERCISES.length-1 ? '<div style="height:0.5px; background:var(--sep);"></div>' : ''}`;
    }).join('');

    const delBtn = document.getElementById('deleteBtn');
    delBtn.textContent = 'Delete'; delBtn.classList.remove('confirm');
    document.getElementById('editModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeEdit() {
    editId = null; deletePending = false;
    document.getElementById('editModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function saveEdit() {
    if (!editId) return;
    const session = sessions.find(s => s.id === editId);
    if (!session) return;
    EXERCISES.forEach(({ name }, idx) => {
      session.entries[name] = {
        weight: parseFloat(document.getElementById(`ew${idx}`).value)||0,
        reps:   parseInt(document.getElementById(`er${idx}`).value)||0,
      };
    });
    save(); closeEdit(); flash('rgba(52,199,89,0.1)'); refreshAll();
  }

  function deleteSessionById() {
    if (!editId) return;
    if (!deletePending) {
      deletePending = true;
      const btn = document.getElementById('deleteBtn');
      btn.textContent = 'Confirm Delete'; btn.classList.add('confirm'); return;
    }
    sessions = sessions.filter(s => s.id !== editId);
    save(); closeEdit(); refreshAll();
  }

  function deleteCard(sessionId, btn) {
    if (!btn.classList.contains('confirm')) {
      btn.classList.add('confirm'); btn.textContent = 'Confirm?';
      setTimeout(() => { btn.classList.remove('confirm'); btn.textContent = 'Delete'; }, 2500);
      return;
    }
    sessions = sessions.filter(s => s.id !== sessionId);
    save(); refreshAll();
  }

  function refreshAll() {
    renderHeatmap(); renderExercises();
    if (historyOpen) renderHistory();
    if (currentView === 'calendar') renderCalendar();
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  setView('log');
  renderHeatmap();
  renderExercises();
  </script>
</body>
</html>
