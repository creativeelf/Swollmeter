<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swollmeter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #010A13;
      --s1:        #0A1428;
      --s2:        #1E2328;
      --s3:        #111822;
      --label:     #F0E6D3;
      --l2:        #C8AA6E;
      --l3:        #795B2A;
      --sep:       #785A28;
      --gold:      #C89B3C;
      --gold-hi:   #F0E6D3;
      --teal:      #0BC4E3;
      --green:     #00C781;
      --red:       #C8291C;
      --red-light: #E84545;
      --topbar-h:  50px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: 'Cinzel', 'Palatino Linotype', Georgia, serif;
      min-height: 100vh;
      overscroll-behavior: none;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(11,196,227,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(200,155,60,0.06) 0%, transparent 50%);
    }

    /* ── Login screen ── */
    #loginScreen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      background-image:
        radial-gradient(ellipse at 50% 20%, rgba(11,196,227,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(200,155,60,0.08) 0%, transparent 45%);
    }
    #loginScreen .login-card {
      width: 100%; max-width: 340px;
      background: var(--s2);
      border: 1px solid var(--sep);
      padding: 32px 24px;
      position: relative;
    }
    #loginScreen .login-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(200,155,60,0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    /* corner ornaments */
    #loginScreen .login-card::after {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 14px; height: 14px;
      border-top: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
    }
    .corner-br {
      position: absolute;
      bottom: -1px; right: -1px;
      width: 14px; height: 14px;
      border-bottom: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      pointer-events: none;
    }

    .login-input {
      width: 100%;
      background: var(--s3);
      border: 1px solid var(--sep);
      color: var(--label);
      font-family: 'Cinzel', serif;
      font-size: 15px; font-weight: 600;
      padding: 13px 14px;
      outline: none;
      letter-spacing: 0.06em;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(200,155,60,0.15);
    }
    .login-input::placeholder { color: var(--l3); font-weight: 400; }

    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(180deg, #1a3a5c 0%, #0e2440 100%);
      color: var(--gold-hi);
      border: 1px solid var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: all 0.15s;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      position: relative;
    }
    .login-btn:active { background: #0d2035; box-shadow: 0 0 16px rgba(200,155,60,0.3); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Top bar (shown when logged in) ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 400;
      height: calc(var(--topbar-h) + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: rgba(1,10,19,0.95);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--sep);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 16px; padding-right: 16px;
    }
    .topbar-user {
      display: flex; align-items: center; gap: 8px;
    }
    .topbar-avatar {
      width: 26px; height: 26px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-weight: 900; font-size: 11px;
      color: #010A13; flex-shrink: 0;
    }
    .topbar-name {
      font-size: 11px; font-weight: 700;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.1em; color: var(--l2);
    }
    .topbar-logout {
      font-family: 'Cinzel', serif;
      font-size: 8px; font-weight: 700;
      color: var(--l3); background: none;
      border: 1px solid rgba(120,90,40,0.5);
      padding: 5px 10px; cursor: pointer;
      letter-spacing: 0.18em; text-transform: uppercase;
      transition: all 0.12s;
    }
    .topbar-logout:active { color: var(--red-light); border-color: var(--red-light); }

    /* ── Flash overlay ── */
    #flashOverlay { position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0; }
    #flashOverlay.active { animation: screenFlash 0.4s ease-out forwards; }
    @keyframes screenFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* ── Section headers ── */
    .section-label {
      font-size: 10px; font-weight: 700; color: var(--l3);
      text-transform: uppercase; letter-spacing: 0.2em;
      margin-bottom: 10px; padding: 0 4px;
      font-family: 'Cinzel', serif;
    }

    /* ── Decorative divider ── */
    .lol-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .lol-divider::before, .lol-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--sep));
    }
    .lol-divider::after { background: linear-gradient(90deg, var(--sep), transparent); }
    .lol-divider span { color: var(--gold); font-size: 10px; flex-shrink: 0; }

    /* ── Panel card ── */
    .card {
      background: var(--s2);
      border: 1px solid var(--sep);
      position: relative;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(200,155,60,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .card.logged { animation: cardPop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes cardPop {
      0%   { box-shadow: none; }
      45%  { box-shadow: 0 0 24px rgba(11,196,227,0.35), inset 0 0 12px rgba(11,196,227,0.08); }
      100% { box-shadow: none; }
    }

    /* ── Inputs ── */
    input[type="number"] {
      background: var(--s3); color: var(--label);
      border: none; outline: none;
      font-family: 'Cinzel', serif;
      font-size: 16px; font-weight: 600;
      -moz-appearance: textfield;
      width: 100%; text-align: center; height: 44px;
      letter-spacing: 0.05em;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      box-shadow: inset 0 0 0 1px var(--gold);
      background: rgba(200,155,60,0.06);
    }
    input[type="number"]::placeholder { color: var(--l3); }

    /* ── Duration slider ── */
    .dur-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px;
      background: linear-gradient(90deg, var(--gold) var(--pct, 0%), var(--s3) var(--pct, 0%));
      border-radius: 0; outline: none; cursor: pointer;
      border: 1px solid var(--sep);
    }
    .dur-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px;
      background: var(--gold);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      cursor: pointer; transition: background 0.12s;
    }
    .dur-slider::-webkit-slider-thumb:active { background: var(--gold-hi); }
    .dur-slider::-moz-range-thumb {
      width: 22px; height: 22px;
      background: var(--gold);
      border: none; border-radius: 0; cursor: pointer;
    }
    .dur-slider:focus { box-shadow: 0 0 0 1px var(--gold); }

    /* ── Stepper buttons ── */
    .step-btn {
      background: var(--s3); color: var(--gold);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; touch-action: manipulation;
      font-size: 20px; font-weight: 700;
      min-width: 44px; height: 44px;
      transition: background 0.1s, color 0.1s; font-family: serif;
    }
    .step-btn:active { background: rgba(200,155,60,0.15); color: var(--gold-hi); }

    /* ── Primary log button ── */
    #mainLogBtn {
      width: 100%; padding: 15px;
      background: linear-gradient(180deg, #1a3a5c 0%, #0e2440 100%);
      color: var(--gold-hi); border: 1px solid var(--gold);
      font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.2em; text-transform: uppercase;
      touch-action: manipulation; transition: all 0.15s; position: relative;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }
    #mainLogBtn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(11,196,227,0.08) 0%, transparent 100%);
      pointer-events: none;
    }
    #mainLogBtn:active { background: linear-gradient(180deg, #0d2035 0%, #060f1c 100%); box-shadow: 0 0 16px rgba(200,155,60,0.3); }
    #mainLogBtn.success { animation: btnSuccess 1.6s ease-out forwards; }
    @keyframes btnSuccess {
      0%   { border-color: var(--green); color: var(--green); box-shadow: 0 0 20px rgba(0,199,129,0.4); }
      70%  { border-color: var(--green); color: var(--green); box-shadow: 0 0 20px rgba(0,199,129,0.4); }
      100% { border-color: var(--gold); color: var(--gold-hi); box-shadow: none; }
    }

    /* ── Week count ── */
    #weekCount {
      font-size: 42px; font-weight: 900; color: transparent;
      background: linear-gradient(180deg, #F0E6D3 0%, #C89B3C 100%);
      -webkit-background-clip: text; background-clip: text;
      line-height: 1; letter-spacing: -2px; font-family: 'Cinzel', serif;
    }

    /* ── Heatmap ── */
    .hm-day { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
    .hm-label { font-size: 9px; font-weight: 700; color: var(--l3); letter-spacing: 0.1em; font-family: 'Cinzel', serif; }
    .hm-dot {
      width: 30px; height: 30px; background: var(--s2);
      border: 1px solid var(--sep);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: transparent; transition: all 0.3s;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .hm-day.active .hm-label { color: var(--gold); }
    .hm-day.active .hm-dot   { background: var(--gold); color: var(--bg); border-color: var(--gold-hi); }
    .hm-day.today  .hm-label { color: var(--teal); font-weight: 700; }
    .hm-day.today:not(.active) .hm-dot { background: rgba(11,196,227,0.12); border-color: var(--teal); box-shadow: 0 0 8px rgba(11,196,227,0.3); }

    /* ── Exercise icon tile ── */
    .ex-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    /* ── Action buttons ── */
    .btn-edit {
      font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
      color: var(--teal); background: rgba(11,196,227,0.08);
      border: 1px solid rgba(11,196,227,0.3); padding: 5px 12px;
      cursor: pointer; transition: all 0.12s; touch-action: manipulation;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .btn-edit:active { background: rgba(11,196,227,0.2); }

    .btn-del {
      font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
      color: var(--red-light); background: rgba(200,41,28,0.1);
      border: 1px solid rgba(200,41,28,0.3); padding: 5px 12px;
      cursor: pointer; transition: all 0.12s; touch-action: manipulation;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .btn-del:active { background: rgba(200,41,28,0.2); }
    .btn-del.confirm { background: var(--red); color: var(--label); border-color: var(--red-light); }

    /* ── History / friend card ── */
    .history-card {
      background: var(--s2); border: 1px solid var(--sep); padding: 14px; position: relative;
    }
    .history-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--gold), transparent);
    }
    .history-card.mine { border-color: var(--gold); }
    .history-card.mine::before { background: linear-gradient(180deg, var(--teal), transparent); }

    /* ── Friend avatar ── */
    .friend-avatar {
      width: 36px; height: 36px; flex-shrink: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-weight: 900; font-size: 13px;
      color: #010A13;
    }

    /* ── BOTTOM NAV ── */
    #bottomNav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(1,10,19,0.96);
      border-top: 1px solid var(--sep);
      display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 500;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 10px 0;
      color: var(--l3); background: transparent; border: none;
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700;
      cursor: pointer; transition: color 0.18s; touch-action: manipulation;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .nav-tab svg { width: 22px; height: 22px; }
    .nav-tab.active { color: var(--gold); }
    .nav-tab.active svg { filter: drop-shadow(0 0 4px rgba(200,155,60,0.6)); }

    /* ── Title ── */
    .lol-title {
      font-family: 'Cinzel', serif; font-size: 30px; font-weight: 900;
      letter-spacing: 0.05em; line-height: 1.05;
      background: linear-gradient(180deg, #F0E6D3 0%, #C89B3C 60%, #785A28 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .lol-subtitle {
      font-size: 10px; color: var(--l3); letter-spacing: 0.3em;
      text-transform: uppercase; font-family: 'Cinzel', serif; margin-top: 4px;
    }

    /* ── CALENDAR ── */
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
    .cal-dow span {
      text-align: center; font-size: 10px; font-weight: 700;
      color: var(--l3); padding: 4px 0;
      font-family: 'Cinzel', serif; letter-spacing: 0.1em;
    }
    #calGrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.14s;
      touch-action: manipulation; user-select: none; position: relative;
    }
    .cal-cell.empty  { cursor: default; pointer-events: none; }
    .cal-cell .cn    { font-size: 13px; font-weight: 600; color: rgba(240,230,211,0.5); font-family: 'Cinzel', serif; }
    .cal-cell .cd    { width: 4px; height: 4px; background: transparent; margin-top: 2px; transform: rotate(45deg); }
    .cal-cell.has-session .cd { background: var(--gold); }
    .cal-cell.is-today:not(.is-selected) { background: rgba(11,196,227,0.08); border: 1px solid rgba(11,196,227,0.3); }
    .cal-cell.is-today .cn   { color: var(--teal); font-weight: 700; }
    .cal-cell.is-selected    { background: rgba(200,155,60,0.15); border: 1px solid var(--gold); }
    .cal-cell.is-selected .cn { color: var(--gold-hi); font-weight: 700; }
    .cal-cell.is-selected .cd { background: var(--gold); }
    .cal-cell:not(.empty):not(.is-selected):active { background: rgba(200,155,60,0.08); }

    #dayPanel { animation: fadeUp 0.2s ease-out; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── EDIT MODAL ── */
    #editModal {
      position: fixed; inset: 0; z-index: 800;
      background: rgba(1,10,19,0.8);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: none; align-items: flex-end;
    }
    #editModal.open { display: flex; }
    .modal-sheet {
      width: 100%; background: var(--s1);
      border-top: 1px solid var(--gold);
      max-height: 90vh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom);
      animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1); position: relative;
    }
    .modal-sheet::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-hi), transparent);
    }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-handle { width: 40px; height: 3px; background: var(--sep); margin: 14px auto 0; }

    .modal-primary-btn {
      width: 100%; padding: 14px; border: none;
      font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; touch-action: manipulation;
      letter-spacing: 0.18em; text-transform: uppercase; position: relative;
    }
    .modal-primary-btn.save {
      background: linear-gradient(180deg, #1a3a5c 0%, #0e2440 100%);
      color: var(--gold-hi); border: 1px solid var(--gold);
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    }
    .modal-primary-btn.save:active { background: #0d2035; box-shadow: 0 0 12px rgba(200,155,60,0.3); }
    .modal-primary-btn.cancel { background: transparent; color: var(--l2); border: 1px solid var(--sep); }
    .modal-primary-btn.cancel:active { background: rgba(200,155,60,0.05); }
    .modal-primary-btn.delete { background: transparent; color: var(--red-light); border: 1px solid rgba(200,41,28,0.4); }
    .modal-primary-btn.delete:active { background: rgba(200,41,28,0.1); }
    .modal-primary-btn.delete.confirm { background: var(--red); color: var(--label); border-color: var(--red-light); }

    .month-nav-btn {
      background: var(--s2); border: 1px solid var(--sep); color: var(--gold);
      width: 36px; height: 36px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: all 0.14s;
    }
    .month-nav-btn:active { background: rgba(200,155,60,0.15); }

    .history-toggle-btn {
      font-size: 10px; font-weight: 700; color: var(--gold);
      background: none; border: none; cursor: pointer;
      font-family: 'Cinzel', serif; letter-spacing: 0.15em; text-transform: uppercase;
    }

    /* ── Loading spinner ── */
    .loading-dot {
      display: inline-block; width: 6px; height: 6px;
      background: var(--gold); border-radius: 50%; margin: 0 2px;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.7); } 40% { opacity: 1; transform: scale(1); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--sep); }
  </style>
</head>
<body>

  <!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
  <div id="loginScreen">
    <div style="text-align:center; margin-bottom:36px;">
      <div class="lol-title" style="font-size:38px;">Swollmeter</div>
      <div class="lol-subtitle" style="margin-top:6px;">Gym Progress Tracker</div>
    </div>

    <div class="login-card">
      <div class="corner-br"></div>

      <div class="lol-divider" style="margin-bottom:24px;"><span>◆</span></div>

      <div style="font-size:9px; font-weight:700; color:var(--l3); letter-spacing:0.25em; text-transform:uppercase; font-family:'Cinzel',serif; margin-bottom:10px;">
        Your Name
      </div>

      <input type="text" id="usernameInput" class="login-input"
        placeholder="Enter your username..."
        maxlength="20"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')doLogin()">

      <div id="loginError" style="font-size:10px; color:var(--red-light); font-family:'Cinzel',serif; letter-spacing:0.08em; min-height:20px; margin-top:8px;"></div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()" style="margin-top:8px;">
        Enter Your Name
      </button>

      <div class="lol-divider" style="margin-top:24px;"><span>◆</span></div>

  // ── Constants ─────────────────────────────────────────────────────────────
  const EXERCISES = [

    { name:'Chest Press',    emoji:'🏋️', bg:'linear-gradient(135deg,#8B2500,#C84B00)', weightStep:5,  repsStep:1,  type:'strength' },

    { name:'Running',   emoji:'🏃', bg:'linear-gradient(135deg,#7A2800,#E07020)', type:'duration', maxMin:180 },

    { name:'Swimming',  emoji:'🏊', bg:'linear-gradient(135deg,#0A2A5C,#0BC4E3)', type:'duration', maxMin:180 },
  ];
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];
  const USER_KEY    = 'swollmeter_user';
  const ADMIN_USER  = 'admin';   // special account with full edit/delete access
  // Gold palette for user avatars (cycled via username hash)
  const AVATAR_COLORS = ['#C89B3C','#0BC4E3','#00C781','#E84545','#AF52DE','#E67E22','#3498DB','#F39C12'];

  // ── State ─────────────────────────────────────────────────────────────────
  let currentUser   = null;
  let sessions      = [];      // current user's sessions
  let allSessions   = [];      // everyone's sessions (friends feed)
  let currentView   = 'log';
  let calYear       = new Date().getFullYear();
  let calMonth      = new Date().getMonth();
  let selectedDay   = null;
  let editId        = null;
  let deletePending = false;
  let historyOpen   = false;
  let masterRef          = null;   // single listener on db.ref('sessions')

  // ── Helpers ───────────────────────────────────────────────────────────────
  function formatDuration(minutes) {
    minutes = parseInt(minutes) || 0;
    if (minutes === 0) return '0 min';
    if (minutes < 60)  return `${minutes} min`;
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return m > 0 ? `${h} hr ${m} min` : `${h} hr`;
  }

  // Update slider gradient fill and display label in sync
  function syncSlider(sliderEl, displayId) {
    const pct = ((sliderEl.value - sliderEl.min) / (sliderEl.max - sliderEl.min) * 100).toFixed(1);
    sliderEl.style.setProperty('--pct', pct + '%');
    if (displayId) document.getElementById(displayId).textContent = formatDuration(sliderEl.value);
  }

  function usernameColor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) % AVATAR_COLORS.length;
    return AVATAR_COLORS[Math.abs(h)];
  }

  function sanitizeUsername(raw) {
    return raw.trim().replace(/[.#$[\]/]/g, '').toLowerCase().slice(0, 20);
  }

  function flash(color = 'rgba(200,155,60,0.1)') {
    const ov = document.getElementById('flashOverlay');
    ov.style.background = color;
    ov.classList.remove('active'); void ov.offsetWidth; ov.classList.add('active');
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    setTimeout(() => { el.textContent = ''; }, 3000);
  }

  // ── Auth ──────────────────────────────────────────────────────────────────

  // Firebase can hang forever (never rejects) when rules block a read.
  // We race against a timeout so the button never stays frozen.
  // timeoutMs of 15 s covers Firebase cold-start on slow connections.
  function fbOnce(ref, timeoutMs = 15000) {
    return Promise.race([
      ref.once('value'),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error('timeout')), timeoutMs)
      )
    ]);
  }

  function setLoginBtn(state, label) {
    const btn = document.getElementById('loginBtn');
    if (state === 'loading') {
      btn.disabled = true;
      btn.innerHTML = `<span style="font-size:10px;letter-spacing:0.1em;">${label || 'Connecting'}&nbsp;</span>`
        + '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
    } else {
      btn.disabled = false;
      btn.textContent = label || 'Enter Your Name';
    }
  }

  function showLoginError(msg, showRetry = false) {
    const el = document.getElementById('loginError');
    el.innerHTML = msg + (showRetry
      ? `&nbsp;<span onclick="doLogin()" style="color:var(--teal);cursor:pointer;text-decoration:underline;">Retry</span>`
      : '');
    if (!showRetry) setTimeout(() => { el.innerHTML = ''; }, 4000);
  }

  async function doLogin() {
    if (!db) { showLoginError('Firebase not configured.'); return; }
    const raw = document.getElementById('usernameInput').value;
    const username = sanitizeUsername(raw);
    if (!username) { showLoginError('Enter a valid username.'); return; }

    // Clear any previous error + retry link
    document.getElementById('loginError').innerHTML = '';

    setLoginBtn('loading', 'Connecting');

    // Helper: try once with given timeout
    async function attempt(ms) {
      const snap = await fbOnce(db.ref(`users/${username}`), ms);
      return snap;
    }

    try {
      let snap;
      try {
        // First attempt — 15 s (covers Firebase cold-start)
        snap = await attempt(15000);
      } catch(e) {
        if (e.message !== 'timeout') throw e;
        // Silent auto-retry once before giving up
        setLoginBtn('loading', 'Retrying');
        snap = await attempt(12000);
      }

      // Fire-and-forget all writes — never await, can't hang login
      if (!snap.exists()) {
        db.ref(`users/${username}`).set({ username, joinedAt: Date.now() }).catch(() => {});
      }
      db.ref(`users/${username}/lastSeen`).set(Date.now()).catch(() => {});

      currentUser = username;
      localStorage.setItem(USER_KEY, username);
      enterApp();

    } catch(e) {
      console.error('Login error:', e);
      setLoginBtn('ready', 'Enter Your Name');
      if (e.message === 'timeout') {
        // Most likely cause: Firebase test-mode rules expired (they last 30 days)
        // or a genuinely slow connection. Show a retry link so user doesn't retype.
        showLoginError('Connection timed out.', true);
      } else {
        showLoginError('Connection error — check network.');
      }
    }
  }

  function doLogout() {
    if (masterRef) { masterRef.off(); masterRef = null; }
    currentUser = null;
    sessions = [];
    allSessions = [];
    historyOpen = false;
    localStorage.removeItem(USER_KEY);
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = '';
    document.getElementById('usernameInput').value = '';
    resetLoginBtn();
  }

  function enterApp() {
    const isAdmin = currentUser === ADMIN_USER;
    const color   = isAdmin ? '#C8291C' : usernameColor(currentUser);
    const initial = currentUser[0].toUpperCase();
    const av = document.getElementById('topBarAvatar');
    av.style.background = color;
    av.textContent = initial;
    document.getElementById('topBarName').innerHTML = isAdmin
      ? `${currentUser}&nbsp;<span style="font-size:8px;font-weight:700;color:var(--red-light);letter-spacing:0.18em;border:1px solid rgba(200,41,28,0.5);padding:2px 5px;vertical-align:middle;">ADMIN</span>`
      : currentUser;

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = '';

    sessions = []; allSessions = [];
    renderHeatmap(); renderExercises();

    startMasterListener();
    setView('log');
  }

  // ── ONE listener on db.ref('sessions') — no queries, filter client-side ──
  function startMasterListener() {
    if (masterRef) masterRef.off();
    masterRef = db.ref('sessions');
    masterRef.on('value', snap => {
      const all = [];
      snap.forEach(child => { const s = child.val(); if (s) all.push(s); });

      allSessions = [...all].sort((a, b) => new Date(b.date) - new Date(a.date));
      sessions    = all.filter(s => s.username === currentUser)
                       .sort((a, b) => new Date(a.date) - new Date(b.date));

      if (currentView === 'log') {
        renderHeatmap(); renderExercises();
        if (historyOpen) renderHistory();
      }
      if (currentView === 'calendar') renderCalendar();
      if (currentView === 'friends')  renderFriends();
    });
  }

  // ── Fire-and-forget writes — nothing ever awaited ─────────────────────────
  function dbWrite(path, data) {
    db.ref(path).set(data).catch(e => console.error('Write error:', e));
  }
  function dbRemove(path) {
    db.ref(path).remove().catch(e => console.error('Remove error:', e));
  }

  // ── View routing ──────────────────────────────────────────────────────────
  function setView(v) {
    currentView = v;
    document.getElementById('viewLog').style.display      = v === 'log'      ? '' : 'none';
    document.getElementById('viewCalendar').style.display = v === 'calendar' ? '' : 'none';
    document.getElementById('viewFriends').style.display  = v === 'friends'  ? '' : 'none';
    ['log','calendar','friends'].forEach(t =>
      document.getElementById(`tab-${t}`).classList.toggle('active', v === t));
    if (v === 'calendar') renderCalendar();
    if (v === 'friends')  {
      // Show loading state, then do a fresh read so the feed is never stale
      const feed = document.getElementById('friendsFeed');
      feed.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--l3);font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.12em;">
        <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
      </div>`;
      db.ref('sessions').once('value').then(snap => {
        const all = [];
        snap.forEach(child => { const s = child.val(); if (s) all.push(s); });
        allSessions = [...all].sort((a, b) => new Date(b.date) - new Date(a.date));
        renderFriends();
      }).catch(() => renderFriends()); // fall back to cached allSessions on error
    }
  }

  // ── Heatmap ───────────────────────────────────────────────────────────────
  function renderHeatmap() {
    const el    = document.getElementById('heatmap');
    const today = new Date().getDay();
    const now   = new Date();
    const sow   = new Date(now);
    sow.setDate(now.getDate() - now.getDay()); sow.setHours(0,0,0,0);
    const week  = sessions.filter(s => new Date(s.date) >= sow);
    const byDay = {};
    week.forEach(s => { const d = new Date(s.date).getDay(); byDay[d] = (byDay[d]||0)+1; });
    el.innerHTML = '';
    ['S','M','T','W','T','F','S'].forEach((label, i) => {
      const isActive = (byDay[i]||0) > 0;
      const div = document.createElement('div');
      div.className = `hm-day ${isActive?'active':''} ${i===today?'today':''}`;
      div.innerHTML = `<div class="hm-dot">${isActive ? '✓' : ''}</div><span class="hm-label">${label}</span>`;
      el.appendChild(div);
    });
    document.getElementById('weekCount').textContent = week.length;
  }

  // ── Exercise cards ────────────────────────────────────────────────────────
  function getLastEntry(name) {
    for (let i = sessions.length - 1; i >= 0; i--) {
      const e = (sessions[i].entries || {})[name];
      if (e && (e.weight > 0 || e.reps > 0 || e.duration > 0)) return e;
    }
    return null;
  }

  function renderExercises() {
    const list = document.getElementById('exerciseList');
    list.innerHTML = '';
    EXERCISES.forEach(({ name, emoji, bg, weightStep, repsStep, type, maxMin }, idx) => {
      const last    = getLastEntry(name);
      const hasLast = last !== null;
      const card    = document.createElement('div');
      card.className = 'card'; card.id = `card-${idx}`; card.style.padding = '14px';

      const lastLabel = hasLast
        ? (type === 'duration'
            ? `Last: ${formatDuration(last.duration)}`
            : `Last: ${last.weight} lb &times; ${last.reps} reps`)
        : 'No data yet';

      const inputsHTML = type === 'duration' ? (() => {
        const initVal = hasLast ? last.duration : 0;
        const max     = maxMin || 180;
        const pct     = (initVal / max * 100).toFixed(1);
        return `
          <div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
              <div style="font-size:9px; font-weight:700; color:var(--l3); text-transform:uppercase; letter-spacing:0.15em; font-family:'Cinzel',serif;">Duration</div>
              <div id="dur-disp-${idx}" style="font-size:16px; font-weight:700; color:var(--teal); font-family:'Cinzel',serif; letter-spacing:0.05em;">${formatDuration(initVal)}</div>
            </div>
            <input type="range" class="dur-slider" id="d${idx}"
              min="0" max="${max}" step="15" value="${initVal}"
              style="--pct:${pct}%"
              oninput="syncSlider(this,'dur-disp-${idx}')">
            <div style="display:flex; justify-content:space-between; margin-top:5px;">
              <span style="font-size:9px; color:var(--l3); font-family:'Cinzel',serif;">0</span>
              <span style="font-size:9px; color:var(--l3); font-family:'Cinzel',serif;">${max >= 120 ? '1 hr' : '30 min'}</span>
              <span style="font-size:9px; color:var(--l3); font-family:'Cinzel',serif;">${formatDuration(max)}</span>
            </div>
          </div>`;
      })() : `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div>
            <div style="font-size:9px; font-weight:700; color:var(--l3); text-transform:uppercase; letter-spacing:0.15em; margin-bottom:6px; font-family:'Cinzel',serif;">Weight (lb)</div>
            <div style="display:flex; border:1px solid var(--sep); overflow:hidden;">
              <button class="step-btn" onclick="step('w${idx}',-${weightStep})">−</button>
              <input type="number" id="w${idx}" min="0" step="${weightStep}" placeholder="0" value="${hasLast ? last.weight : ''}">
              <button class="step-btn" onclick="step('w${idx}',${weightStep})">+</button>
            </div>
          </div>
          <div>
            <div style="font-size:9px; font-weight:700; color:var(--l3); text-transform:uppercase; letter-spacing:0.15em; margin-bottom:6px; font-family:'Cinzel',serif;">Reps</div>
            <div style="display:flex; border:1px solid var(--sep); overflow:hidden;">
              <button class="step-btn" onclick="step('r${idx}',-${repsStep})">−</button>
              <input type="number" id="r${idx}" min="0" step="${repsStep}" placeholder="0" value="${hasLast ? last.reps : ''}">
              <button class="step-btn" onclick="step('r${idx}',${repsStep})">+</button>
            </div>
          </div>
        </div>`;

      card.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
          <div class="ex-icon" style="background:${bg};">${emoji}</div>
          <div style="flex:1; min-width:0;">
            <div style="font-size:14px; font-weight:700; letter-spacing:0.08em; font-family:'Cinzel',serif;">${name}</div>
            <div style="font-size:11px; color:${hasLast?'var(--teal)':'var(--l3)'}; margin-top:3px; letter-spacing:0.05em; font-family:'Cinzel',serif;">
              ${lastLabel}
            </div>
          </div>
        </div>
        <div style="height:1px; background:linear-gradient(90deg,var(--sep),transparent); margin-bottom:12px;"></div>
        ${inputsHTML}`;
      list.appendChild(card);
    });
  }

  function step(id, delta) {
    const el = document.getElementById(id);
    el.value = Math.max(0, (parseFloat(el.value)||0) + delta);
  }

  // ── Log session ───────────────────────────────────────────────────────────
  function logSession() {
    const entries = {}; let hasData = false;
    EXERCISES.forEach(({ name, type }, idx) => {
      if (type === 'duration') {
        const d = parseInt(document.getElementById(`d${idx}`).value)||0;
        entries[name] = { duration: d };
        if (d > 0) hasData = true;
      } else {
        const w = parseFloat(document.getElementById(`w${idx}`).value)||0;
        const r = parseInt(document.getElementById(`r${idx}`).value)||0;
        entries[name] = { weight:w, reps:r };
        if (w > 0 || r > 0) hasData = true;
      }
    });
    if (!hasData) { flash('rgba(200,41,28,0.1)'); return; }

    const session = { id: Date.now(), date: new Date().toISOString(), entries, username: currentUser };

    // Optimistic local update — master listener will sync from Firebase shortly
    sessions.push(session);
    allSessions.unshift(session);

    flash('rgba(0,199,129,0.08)');
    EXERCISES.forEach((_, idx) => {
      const card = document.getElementById(`card-${idx}`);
      if (!card) return;
      setTimeout(() => { card.classList.remove('logged'); void card.offsetWidth; card.classList.add('logged'); }, idx * 65);
    });
    const btn = document.getElementById('mainLogBtn');
    btn.textContent = '✓  Session Logged'; btn.classList.add('success');
    setTimeout(() => { btn.classList.remove('success'); btn.textContent = 'Log Session'; }, 1700);

    renderHeatmap(); renderExercises();
    if (historyOpen) renderHistory();

    // Fire-and-forget write — never awaited, can't hang
    dbWrite(`sessions/${session.id}`, session);
  }

  // ── History ───────────────────────────────────────────────────────────────
  function toggleHistory() {
    historyOpen = !historyOpen;
    document.getElementById('historyPanel').style.display = historyOpen ? 'flex' : 'none';
    document.getElementById('historyToggle').textContent  = historyOpen ? 'Hide' : 'Show';
    if (historyOpen) renderHistory();
  }

  function sessionCardHTML(s, showUser = false) {
    const d       = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const timeStr = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    const isMe    = s.username === currentUser;

    const rows = EXERCISES.map(({ name, emoji, type }) => {
      const e = (s.entries || {})[name];
      if (!e) return '';
      if (type === 'duration') {
        if (!e.duration) return '';
        return `<div style="display:flex; justify-content:space-between; align-items:center; padding:3px 0;">
          <span style="font-size:12px; color:var(--l2); font-family:'Cinzel',serif;">${emoji}&nbsp;${name}</span>
          <span style="font-size:12px; font-weight:600; color:var(--teal); font-family:'Cinzel',serif;">${formatDuration(e.duration)}</span>
        </div>`;
      } else {
        if (e.weight===0 && e.reps===0) return '';
        return `<div style="display:flex; justify-content:space-between; align-items:center; padding:3px 0;">
          <span style="font-size:12px; color:var(--l2); font-family:'Cinzel',serif;">${emoji}&nbsp;${name}</span>
          <span style="font-size:12px; font-weight:600; color:var(--teal); font-family:'Cinzel',serif;">${e.weight} lb &times; ${e.reps}</span>
        </div>`;
      }
    }).filter(Boolean).join('');

    const headerRow = showUser ? (() => {
      const color = usernameColor(s.username || '?');
      const initial = (s.username||'?')[0].toUpperCase();
      const isAdmin = currentUser === ADMIN_USER;
      // Admin sees edit/delete on every card; normal users only see them on their own (handled below)
      const adminControls = (isAdmin || isMe) ? `
        <div style="display:flex; gap:6px; flex-shrink:0; margin-left:auto;">
          <button class="btn-del" id="del-${s.id}" onclick="deleteCard(${s.id},this)">Delete</button>
          <button class="btn-edit" onclick="openEdit(${s.id})">Edit</button>
        </div>` : '';
      return `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <div class="friend-avatar" style="background:${color};">${initial}</div>
          <div style="flex:1; min-width:0;">
            <div style="font-size:13px; font-weight:700; font-family:'Cinzel',serif; color:${isMe?'var(--gold)':'var(--l2)'};">
              ${s.username||'unknown'}${isMe ? '&nbsp;<span style="font-size:9px;color:var(--l3);">(you)</span>' : ''}
            </div>
            <div style="font-size:10px; color:var(--l3); font-family:'Cinzel',serif; letter-spacing:0.06em;">${dateStr} · ${timeStr}</div>
          </div>
          ${adminControls}
        </div>`;
    })() : `
      <div style="display:flex; justify-content:space-between; align-items:center; ${rows?'margin-bottom:10px;':''}">
        <div>
          <div style="font-size:13px; font-weight:700; font-family:'Cinzel',serif; color:var(--l2);">${dateStr}</div>
          <div style="font-size:10px; color:var(--l3); margin-top:2px; font-family:'Cinzel',serif; letter-spacing:0.08em;">${timeStr}</div>
        </div>
        <div style="display:flex; gap:8px; flex-shrink:0;">
          <button class="btn-del" id="del-${s.id}" onclick="deleteCard(${s.id},this)">Delete</button>
          <button class="btn-edit" onclick="openEdit(${s.id})">Edit</button>
        </div>
      </div>`;

    return `
      <div class="history-card ${isMe&&showUser?'mine':''}">
        ${headerRow}
        ${rows ? `<div style="border-top:1px solid rgba(120,90,40,0.4); padding-top:8px;">${rows}</div>` : ''}
      </div>`;
  }

  function renderHistory() {
    const panel  = document.getElementById('historyPanel');
    const recent = [...sessions].reverse().slice(0, 15);
    panel.innerHTML = recent.length === 0
      ? `<div style="font-size:13px;color:var(--l3);text-align:center;padding:20px 0;font-family:'Cinzel',serif;letter-spacing:0.1em;">No sessions yet</div>`
      : recent.map(s => sessionCardHTML(s, false)).join('');
  }

  // ── Friends feed ──────────────────────────────────────────────────────────
  function renderFriends() {
    const feed = document.getElementById('friendsFeed');
    if (allSessions.length === 0) {
      feed.innerHTML = `
        <div style="text-align:center;padding:40px 0;">
          <div style="font-size:24px;margin-bottom:12px;">⚔️</div>
          <div style="font-size:13px;color:var(--l3);font-family:'Cinzel',serif;letter-spacing:0.1em;">No friends have trained yet</div>
          <div style="font-size:10px;color:var(--l3);font-family:'Cinzel',serif;margin-top:6px;opacity:0.6;">Be the first to log a session</div>
        </div>`;
      return;
    }
    const cards = [];
    for (const s of allSessions) {
      try {
        cards.push(sessionCardHTML(s, true));
      } catch(err) {
        console.warn('Skipping malformed session:', s.id, err);
      }
    }
    feed.innerHTML = cards.join('');
  }

  // ── Calendar ──────────────────────────────────────────────────────────────
  function shiftMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    selectedDay = null; renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
    const now          = new Date();
    const daysInMonth  = new Date(calYear, calMonth+1, 0).getDate();
    const firstWeekday = new Date(calYear, calMonth, 1).getDay();
    const byDay = {};
    sessions.forEach(s => {
      const d = new Date(s.date);
      if (d.getFullYear()===calYear && d.getMonth()===calMonth)
        byDay[d.getDate()] = (byDay[d.getDate()]||0) + 1;
    });
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    for (let i = 0; i < firstWeekday; i++) {
      const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = now.getFullYear()===calYear && now.getMonth()===calMonth && now.getDate()===d;
      const isSel   = selectedDay && selectedDay.year===calYear && selectedDay.month===calMonth && selectedDay.day===d;
      const el = document.createElement('div');
      el.className = `cal-cell ${byDay[d]?'has-session':''} ${isToday?'is-today':''} ${isSel?'is-selected':''}`;
      el.innerHTML = `<span class="cn">${d}</span><span class="cd"></span>`;
      el.onclick   = () => selectCalDay(calYear, calMonth, d);
      grid.appendChild(el);
    }
    renderDayPanel();
  }

  function selectCalDay(year, month, day) {
    selectedDay = (selectedDay && selectedDay.year===year && selectedDay.month===month && selectedDay.day===day)
      ? null : { year, month, day };
    renderCalendar();
  }

  function renderDayPanel() {
    const panel = document.getElementById('dayPanel');
    if (!selectedDay) { panel.innerHTML = ''; return; }
    const { year, month, day } = selectedDay;
    const daySessions = sessions.filter(s => {
      const d = new Date(s.date);
      return d.getFullYear()===year && d.getMonth()===month && d.getDate()===day;
    });
    const dateStr = new Date(year, month, day).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    panel.innerHTML = `
      <div class="lol-divider" style="margin-bottom:14px;"><span>◆</span></div>
      <div style="font-size:13px;font-weight:700;color:var(--l2);margin-bottom:12px;font-family:'Cinzel',serif;letter-spacing:0.08em;">${dateStr}</div>
      ${daySessions.length === 0
        ? `<div style="font-size:13px;color:var(--l3);text-align:center;padding:16px 0;font-family:'Cinzel',serif;letter-spacing:0.1em;">No sessions this day</div>`
        : `<div style="display:flex;flex-direction:column;gap:8px;">${daySessions.map(s => sessionCardHTML(s,false)).join('')}</div>`
      }`;
  }

  // ── Edit modal ────────────────────────────────────────────────────────────
  function openEdit(sessionId) {
    // Admin can edit any session; normal users only their own
    const pool = currentUser === ADMIN_USER ? allSessions : sessions;
    const session = pool.find(s => s.id === sessionId);
    if (!session) return;
    editId = sessionId; deletePending = false;

    const d = new Date(session.date);
    document.getElementById('editDateLabel').textContent =
      d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }) +
      ' · ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

    document.getElementById('editExercises').innerHTML = EXERCISES.map(({ name, emoji, bg, weightStep, repsStep, type, maxMin }, idx) => {
      const e = (session.entries || {})[name] || {};
      const sep = idx < EXERCISES.length-1
        ? '<div style="height:1px;background:linear-gradient(90deg,transparent,var(--sep),transparent);margin-top:4px;"></div>' : '';

      const inputsHTML = type === 'duration' ? (() => {
        const initVal = e.duration || 0;
        const max     = maxMin || 180;
        const pct     = (initVal / max * 100).toFixed(1);
        return `
          <div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
              <div style="font-size:9px;font-weight:700;color:var(--l3);text-transform:uppercase;letter-spacing:0.15em;font-family:'Cinzel',serif;">Duration</div>
              <div id="edit-dur-disp-${idx}" style="font-size:16px;font-weight:700;color:var(--teal);font-family:'Cinzel',serif;">${formatDuration(initVal)}</div>
            </div>
            <input type="range" class="dur-slider" id="ed${idx}"
              min="0" max="${max}" step="15" value="${initVal}"
              style="--pct:${pct}%"
              oninput="syncSlider(this,'edit-dur-disp-${idx}')">
            <div style="display:flex;justify-content:space-between;margin-top:5px;">
              <span style="font-size:9px;color:var(--l3);font-family:'Cinzel',serif;">0</span>
              <span style="font-size:9px;color:var(--l3);font-family:'Cinzel',serif;">${max >= 120 ? '1 hr' : '30 min'}</span>
              <span style="font-size:9px;color:var(--l3);font-family:'Cinzel',serif;">${formatDuration(max)}</span>
            </div>
          </div>`;
      })() : `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <div style="font-size:9px;font-weight:700;color:var(--l3);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px;font-family:'Cinzel',serif;">Weight (lb)</div>
            <div style="display:flex;border:1px solid var(--sep);overflow:hidden;">
              <button class="step-btn" onclick="step('ew${idx}',-${weightStep})">−</button>
              <input type="number" id="ew${idx}" min="0" step="${weightStep}" value="${e.weight||''}" placeholder="0">
              <button class="step-btn" onclick="step('ew${idx}',${weightStep})">+</button>
            </div>
          </div>
          <div>
            <div style="font-size:9px;font-weight:700;color:var(--l3);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px;font-family:'Cinzel',serif;">Reps</div>
            <div style="display:flex;border:1px solid var(--sep);overflow:hidden;">
              <button class="step-btn" onclick="step('er${idx}',-${repsStep})">−</button>
              <input type="number" id="er${idx}" min="0" step="${repsStep}" value="${e.reps||''}" placeholder="0">
              <button class="step-btn" onclick="step('er${idx}',${repsStep})">+</button>
            </div>
          </div>
        </div>`;

      return `
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div class="ex-icon" style="background:${bg};width:32px;height:32px;font-size:16px;">${emoji}</div>
            <span style="font-size:13px;font-weight:700;font-family:'Cinzel',serif;letter-spacing:0.08em;color:var(--l2);">${name}</span>
          </div>
          ${inputsHTML}
        </div>${sep}`;
    }).join('');

    const delBtn = document.getElementById('deleteBtn');
    delBtn.textContent = 'Delete'; delBtn.classList.remove('confirm');
    document.getElementById('editModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeEdit() {
    editId = null; deletePending = false;
    document.getElementById('editModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function saveEdit() {
    if (!editId) return;
    const pool = currentUser === ADMIN_USER ? allSessions : sessions;
    const session = pool.find(s => s.id === editId);
    if (!session) return;
    const entries = {};
    EXERCISES.forEach(({ name, type }, idx) => {
      if (type === 'duration') {
        entries[name] = { duration: parseInt(document.getElementById(`ed${idx}`).value)||0 };
      } else {
        entries[name] = {
          weight: parseFloat(document.getElementById(`ew${idx}`).value)||0,
          reps:   parseInt(document.getElementById(`er${idx}`).value)||0,
        };
      }
    });
    session.entries = entries;
    closeEdit();
    flash('rgba(0,199,129,0.08)');
    renderHeatmap(); renderExercises();
    if (historyOpen) renderHistory();
    dbWrite(`sessions/${editId}/entries`, entries);
  }

  function deleteSessionById() {
    if (!editId) return;
    if (!deletePending) {
      deletePending = true;
      const btn = document.getElementById('deleteBtn');
      btn.textContent = 'Confirm Delete'; btn.classList.add('confirm');
      return;
    }
    const id = editId;
    sessions    = sessions.filter(s => s.id !== id);
    allSessions = allSessions.filter(s => s.id !== id);
    closeEdit();
    renderHeatmap(); renderExercises();
    if (historyOpen) renderHistory();
    dbRemove(`sessions/${id}`);
  }

  function deleteCard(sessionId, btn) {
    if (!btn.classList.contains('confirm')) {
      btn.classList.add('confirm'); btn.textContent = 'Confirm?';
      setTimeout(() => { if (!btn.classList.contains('confirm')) return; btn.classList.remove('confirm'); btn.textContent = 'Delete'; }, 2500);
      return;
    }
    sessions    = sessions.filter(s => s.id !== sessionId);
    allSessions = allSessions.filter(s => s.id !== sessionId);
    renderHeatmap(); renderExercises();
    if (historyOpen) renderHistory();
    if (currentView === 'calendar') renderCalendar();
    if (currentView === 'friends')  renderFriends();
    dbRemove(`sessions/${sessionId}`);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  (function init() {
    // Pre-fill the last username but don't auto-login —
    // auto-login caused the button to hang forever if Firebase was slow/blocked.
    const saved = localStorage.getItem(USER_KEY);
    if (saved) {
      document.getElementById('usernameInput').value = saved;
    }
  })();
  </script>
</body>
</html>
